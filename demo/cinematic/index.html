<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuoteX Cinematic Demo</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #07090a;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #07090a;
      }
    </style>
  </head>
  <body>
    <canvas id="film" width="1920" height="1080" aria-label="QuoteX cinematic product demo"></canvas>
    <script type="module" src="./film.js"></script>
  </body>
</html>
